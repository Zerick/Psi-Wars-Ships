<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ error_title | default('Error') }} — Psi-Wars</title>
  <link rel="stylesheet" href="/static/css/main.v047.css?v={{ version }}">
</head>
<body class="page-form">

  <div class="form-container">
    <header class="form-header">
      <a href="/" class="back-link">← Back</a>
      <h1>{{ error_title | default('Error') }}</h1>
      <p class="form-subtitle error-text">{{ error_message | default('Something went wrong.') }}</p>
    </header>

    <nav class="landing-actions" style="margin-top: 2rem;">
      <a href="/" class="btn btn-secondary btn-large">Return Home</a>
      <a href="/join" class="btn btn-ghost btn-large">Try Joining Again</a>
    </nav>
  </div>

  <div class="version-stamp">v{{ version }}</div>
</body>
</html>
