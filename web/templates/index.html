<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psi-Wars Combat Simulator</title>
  <link rel="stylesheet" href="/static/css/main.v047.css?v={{ version }}">
</head>
<body class="page-landing">

  <div class="landing-container">
    <header class="landing-header">
      <h1 class="landing-title">PSI-WARS</h1>
      <p class="landing-subtitle">Combat Simulator</p>
    </header>

    <nav class="landing-actions">
      <a href="/create" class="btn btn-primary btn-large">
        <span class="btn-icon">⚔</span>
        Create Session
      </a>
      <a href="/join" class="btn btn-secondary btn-large">
        <span class="btn-icon">🔗</span>
        Join Session
      </a>
      <a href="/sessions" class="btn btn-ghost btn-large">
        <span class="btn-icon">📋</span>
        Browse Sessions
      </a>
    </nav>

    <footer class="landing-footer">
      <p>
        Based on
        <a href="https://psi-wars.wikidot.com/" target="_blank" rel="noopener">Psi-Wars</a>
        by Mailanka — a GURPS Space Opera setting.
      </p>
    </footer>
  </div>

  <div class="version-stamp">v{{ version }}</div>

</body>
</html>
